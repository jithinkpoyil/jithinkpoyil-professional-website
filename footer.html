<header class="site-header">
  <div class="container header-inner">
    <a class="site-brand" href="{{ '/' | relative_url }}" aria-label="Home">
      <span class="site-brand__name">{{ site.author.short_name }}</span>
      <span class="site-brand__tagline">Air Quality · Emissions · ML</span>
    </a>

    <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav">
      <span class="nav-toggle__bar"></span>
      <span class="nav-toggle__bar"></span>
      <span class="nav-toggle__bar"></span>
      <span class="sr-only">Menu</span>
    </button>

    <nav id="site-nav" class="site-nav" aria-label="Primary navigation">
      {% for item in site.nav %}
        <a href="{{ item.url | relative_url }}" {% if page.url == item.url %}class="active"{% endif %}>{{ item.title }}</a>
      {% endfor %}
    </nav>
  </div>
</header>
